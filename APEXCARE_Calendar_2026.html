<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقويم أبكس كير 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green: #0F6E56;
  --green-dark: #085041;
  --green-light: #E1F5EE;
  --green-mid: #1D9E75;
  --coral: #D85A30;
  --coral-light: #FAECE7;
  --blue: #185FA5;
  --blue-light: #E6F1FB;
  --border: #cce8da;
  --bg: #f7fdf9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Tajawal', sans-serif;
  direction: rtl;
  background: var(--bg);
  color: #1a1a1a;
  min-height: 100vh;
}

/* ── SCREEN STYLES ─────────────────────────── */
.screen-only {}

.site-header {
  background: white;
  border-bottom: 2px solid var(--green);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(15,110,86,0.08);
}

.site-header img { height: 44px; width: auto; object-fit: contain; }

.header-title { text-align: center; flex: 1; }
.header-title h1 { font-size: 22px; font-weight: 800; color: var(--green); }
.header-title p { font-size: 12px; color: var(--coral); font-weight: 500; margin-top: 2px; }

.print-btn {
  background: var(--green);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s;
}
.print-btn:hover { background: var(--green-dark); }

.legend-bar {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 10px 24px;
  background: white;
  border-bottom: 1px solid var(--border);
}
.leg {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #555;
  font-weight: 500;
}
.leg-dot { width: 10px; height: 10px; border-radius: 50%; }

.months-wrapper {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 32px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── MONTH CARD ─────────────────────────── */
.month-card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(15,110,86,0.08);
  border: 1px solid var(--border);
}

.month-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%);
  color: white;
}

.mh-logo { height: 36px; width: auto; filter: brightness(0) invert(1) opacity(0.9); }

.mh-center { text-align: center; flex: 1; }
.mh-name { font-size: 28px; font-weight: 800; letter-spacing: 0.5px; }
.mh-hijri { font-size: 12px; opacity: 0.85; margin-top: 2px; font-weight: 400; }

.mh-year { font-size: 36px; font-weight: 800; opacity: 0.2; letter-spacing: 2px; }

.month-body {
  display: flex;
  gap: 0;
}

.cal-section { flex: 1; padding: 16px 16px 12px; }

/* calendar table */
.cal-tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }

.cal-tbl th {
  background: var(--green);
  color: white;
  text-align: center;
  padding: 8px 4px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--green-dark);
}
.cal-tbl th.fri-sat { background: var(--green-dark); }

.cal-tbl td {
  border: 1px solid var(--border);
  vertical-align: top;
  padding: 6px 7px 4px;
  height: 80px;
  background: white;
  transition: background 0.15s;
}
.cal-tbl td:hover { background: #f0faf5; }
.cal-tbl td.empty { background: #f8fcf9; }
.cal-tbl td.wknd { background: #f3fbf7; }
.cal-tbl td.has-hol { border-right: 3px solid var(--coral); }

.day-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 4px;
}
.day-num { font-size: 16px; font-weight: 700; line-height: 1; color: #111; }
.wknd .day-num { color: #aaa; }
.day-hj {
  font-size: 9px;
  color: #bbb;
  background: #f5f5f5;
  padding: 1px 4px;
  border-radius: 3px;
  line-height: 1.5;
  margin-top: 1px;
}

.pills { display: flex; flex-direction: column; gap: 2px; }
.pill {
  font-size: 8.5px;
  padding: 1.5px 5px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
  display: block;
  font-weight: 500;
}
.pill-h { background: var(--green-light); color: #085041; }
.pill-e { background: var(--blue-light); color: #0C447C; }
.pill-n { background: var(--coral-light); color: #993C1D; }
.pill-more { background: #f0f0f0; color: #888; }

.month-motto {
  text-align: center;
  font-size: 13px;
  color: var(--coral);
  font-weight: 600;
  padding: 10px 16px 4px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
  font-style: italic;
}

/* sidebar */
.sidebar {
  width: 200px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 16px 14px;
  background: #fafffe;
}

.sb-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--green-mid);
}

.sb-item {
  display: flex;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #ecf5f0;
  align-items: flex-start;
}
.sb-day {
  font-size: 13px;
  font-weight: 700;
  min-width: 22px;
  text-align: center;
  flex-shrink: 0;
  line-height: 1.3;
}
.sb-name {
  font-size: 10.5px;
  color: #333;
  line-height: 1.5;
  flex: 1;
}
.sb-day.t-h { color: var(--green-mid); }
.sb-day.t-e { color: var(--blue); }
.sb-day.t-n { color: var(--coral); }

/* ── PRINT STYLES ─────────────────────────── */
@media print {
  @page { size: A4 landscape; margin: 8mm; }

  body { background: white; }
  
  .screen-only,
  .site-header,
  .legend-bar,
  .print-btn { display: none !important; }

  .months-wrapper {
    padding: 0;
    gap: 0;
    max-width: none;
  }

  .month-card {
    page-break-after: always;
    break-after: page;
    box-shadow: none;
    border-radius: 0;
    border: none;
    height: 179mm;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .month-header {
    padding: 4mm 5mm;
    flex-shrink: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .mh-logo { height: 10mm; }
  .mh-name { font-size: 18pt; }
  .mh-hijri { font-size: 7.5pt; }
  .mh-year { font-size: 22pt; }

  .month-body { flex: 1; min-height: 0; overflow: hidden; }
  
  .cal-section { padding: 3mm 3mm 2mm; display: flex; flex-direction: column; }
  
  .cal-tbl th { font-size: 7.5pt; padding: 1.5mm 2mm; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cal-tbl td { height: auto; padding: 1mm 1.5mm; }
  .day-num { font-size: 10pt; }
  .day-hj { font-size: 5.5pt; }
  .pill { font-size: 5.5pt; padding: 0.5mm 1.2mm; }

  .month-motto { font-size: 8pt; padding: 1.5mm 0 0; margin-top: 1.5mm; }

  .sidebar { width: 48mm; padding: 3mm 3mm; }
  .sb-title { font-size: 8pt; margin-bottom: 1.5mm; padding-bottom: 1mm; }
  .sb-item { padding: 1mm 0; }
  .sb-day { font-size: 8pt; min-width: 5mm; }
  .sb-name { font-size: 6pt; }

  .cal-tbl td.empty { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cal-tbl td.wknd { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cal-tbl td.has-hol { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .pill-h { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .pill-e { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .pill-n { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .sb-day.t-h { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .sb-day.t-e { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .sb-day.t-n { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

const TYPE_CLASS = {h:'pill-h',e:'pill-e',n:'pill-n'};
const DAY_CLASS  = {h:'t-h',e:'t-e',n:'t-n'};

function pill(t, name) {
  const short = name.length > 22 ? name.slice(0,21)+'…' : name;
  return `<span class="pill ${TYPE_CLASS[t]||'pill-more'}">${short}</span>`;
}

function buildMonth(m0, mdata) {
  const { name, hijri, motto, weeks, events } = mdata;

  // sidebar events
  const sbHTML = events.length
    ? events.map(e => `<div class="sb-item">
        ${e.evs.map(([t,n]) => `<span class="sb-day ${DAY_CLASS[t]||''}">${e.d}</span><span class="sb-name">${n}</span>`).join('')}
      </div>`).join('')
    : '<div style="font-size:11px;color:#aaa;padding:8px 0;text-align:center">لا توجد أحداث</div>';

  // grid rows
  let rowsHTML = '';
  for (const week of weeks) {
    rowsHTML += '<tr>';
    for (const cell of week) {
      if (!cell) {
        rowsHTML += '<td class="empty"></td>';
      } else {
        const { day, hd, evs, wknd, hol } = cell;
        let cls = 'cal-cell';
        if (wknd) cls += ' wknd';
        if (hol)  cls += ' has-hol';
        const ps = evs.slice(0,2).map(([t,n]) => pill(t,n)).join('') +
                   (evs.length > 2 ? `<span class="pill pill-more">+${evs.length-2}</span>` : '');
        rowsHTML += `<td class="${cls}">
          <div class="day-top">
            <span class="day-num">${day}</span>
            <span class="day-hj">${hd} هـ</span>
          </div>
          <div class="pills">${ps}</div>
        </td>`;
      }
    }
    rowsHTML += '</tr>';
  }

  return `
  <div class="month-card">
    <div class="month-header">
      <img class="mh-logo" src="${LOGO}" alt="APEXCARE">
      <div class="mh-center">
        <div class="mh-name">${name} 2026م</div>
        <div class="mh-hijri">${hijri} — 1447/1448هـ</div>
      </div>
      <div class="mh-year">2026</div>
    </div>
    <div class="month-body">
      <div class="cal-section">
        <table class="cal-tbl">
          <thead><tr>
            <th>الأحد</th><th>الاثنين</th><th>الثلاثاء</th>
            <th>الأربعاء</th><th>الخميس</th>
            <th class="fri-sat">الجمعة</th><th class="fri-sat">السبت</th>
          </tr></thead>
          <tbody>${rowsHTML}</tbody>
        </table>
        <div class="month-motto">${motto}</div>
      </div>
      <div class="sidebar">
        <div class="sb-title">أحداث الشهر</div>
        ${sbHTML}
      </div>
    </div>
  </div>`;
}

const root = document.getElementById('calRoot');
root.innerHTML = MONTHS.map((m, i) => buildMonth(i, m)).join('');
